<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <legend><b><h1>Biodata Forms</h1></b></legend>
    <table border="2px" cellspacing="20" cellpadding="20">
        <tr>
            <td>Name </td>
            <td>
                <label for="a"></label>
                <input type="text" placeholder="Enter your Name">
            </td>
        </tr>
        <tr>
            <td>Age</td>
            <td>
                <label for="age"></label>
                <input type="number" id="age" max="18" min="25">
            </td>
        </tr>
        <tr>
            <td>Address</td>
            <td>
            <textarea name="add" id="add" cols="" rows=""></textarea>
            </td>
        </tr>
        <tr>
            <td>Sex</td>
            <td>
            <input type="radio" name="gen" value="male">male
            <br>
            <input type="radio" name="gen" value="female">female
            </td>
        </tr>
        <tr>
            <td>Email</td>
            <td>
                <input type="email" id=" email" placeholder="Enter Email">
            </td>
        </tr>
        <tr>
            <td>Date of Birth</td>
            <td>
                <input type="datetime-local" id="dob" placeholder="Date of Birth">
            </td>
        </tr>
        <tr>
            <td>height</td>
            <td>
                <input type="range">
            </td>
        </tr>
        <tr>
            <td>Tel</td>
            <td>
                <input type="tel" id="ph no" placeholder="Enter Phone number" maxlength="10" minlength="10" required>
            </td>
        </tr>
        <tr>
            <td>My Fav Color</td>
            <td>
                <input type="color">
            </td>
        </tr>
        <tr>
            <td>FB/IG</td>
            <td>
                <input type="email" id=" email" placeholder="Enter Email" >
            </td>
        </tr>
        <tr>
            <td>My Fav pic</td>
            <td>
                <input type="file">
            </td>
        </tr>
        <tr>
            <td>My university</td>
            <td>
            <select>
                <option value="abc">abc</option>
                <option value="bcd">bcd</option>
                <option value="efg">efg</option>
            </select>
            </td>
        </tr>
    </table>
</body>
</html>
