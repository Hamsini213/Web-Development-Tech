<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <legend><b><h1>Application Form</h1></b></legend>

        <label for="FN">First Name:</label>
        <input type="text">
        <label for="LN">Last Name:</label>
        <input type="text" id="LN">
        <br><br>

        <label for="DOB">Date of Birth:</label>
        <input type="datetime-local" id="dob" placeholder="Date of Birth">

        <label for="email"> Email Address:</label>
        <input type="email" id=" email" placeholder="Enter Email" required>
        <br><br>

        <label for="">Postion available:</label>
        <input type="radio" name="course" value="Junior Developer">Junior Developer
        <input type="radio" name="course" value="Mid level Developer">Mid level Developer
        <input type="radio" name="course" value="Senior Developer">Senior Developer
        <br><br>

         <label for="">Programmin Langauge:</label>
        <input type="checkbox" name="course" value="Java">Java
        <input type="checkbox" name="course" value="Java Script">Java Script
        <input type="checkbox" name="course" value="Python">Python
        <br><br>

        <label for="pwd">Password:</label>
        <input type="password" id="pwd" name="password" required placeholder="Enter password">
        <label for="Cpwd"> Confirm Password:</label>
        <input type="password" id="Cpwd" name="password" required placeholder="Enter password">
        <br><br>

        <button>Submit</button>
        <button>Reset</button>

    </form>
</body>
</html>
